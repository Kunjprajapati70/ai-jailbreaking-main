services:
  - type: web
    name: ai-jailbreak-arena
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
